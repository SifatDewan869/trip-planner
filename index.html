                                                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff9a9e">
    
    <link rel="icon" href="https://img.icons8.com/color/512/island-on-water.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/island-on-water.png">
    
    <title>Trip Planner 🌍</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            background-attachment: fixed;
            color: #2d3436; margin: 0; padding: 15px; min-height: 100vh;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px;
            margin: 10px auto;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .info-box h3 { margin: 5px 0; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .info-input { 
            background: rgba(255,255,255,0.5); border: none; padding: 8px; 
            margin: 5px; border-radius: 10px; width: 85%; text-align: center;
            font-weight: bold; color: #2d3436; font-size: 15px;
        }

        .table-container { 
            overflow-x: auto; margin: 20px auto; max-width: 100%; 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { background: rgba(255, 255, 255, 0.3); padding: 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        input { 
            width: 90%; padding: 8px; border: none; background: rgba(255, 255, 255, 0.4); 
            text-align: center; border-radius: 8px; font-size: 14px; color: #2d3436;
        }

        .coming { background-color: rgba(168, 230, 173, 0.4); }
        .notcoming { background-color: rgba(255, 170, 170, 0.4); }

        button { 
            padding: 12px 20px; margin: 8px; border: none; cursor: pointer; 
            font-weight: bold; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); }

        .add-btn { background-color: #ffffff; color: #ff7675; }
        .save-btn { background-color: #fdcb6e; color: #fff; }
        .share-btn { background-color: #55efc4; color: #fff; }
        .del-btn { background: #ff7675; color: white; border-radius: 8px; padding: 5px 10px; border: none; }

        #status, #lastUpdated { font-size: 12px; color: #fff; margin-bottom: 5px; font-weight: bold; }
        #totalBudget { color: #fff; font-size: 24px; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); margin-top: 15px; }
    </style>
</head>
<body>

    <h2>Trip Planner 🌍</h2>
    
    <div class="info-box">
        <h3>📅 Trip Details</h3>
        <input type="text" id="tripDate" class="info-input" placeholder="Set Date">
        <input type="text" id="tripTime" class="info-input" placeholder="Set Time">
    </div>
    
    <div id="status">Syncing...</div>
    <div id="lastUpdated">Last saved: Never</div>

    <div class="table-container">
        <table id="tripTable">
            <tr><th>Name</th><th>OK?</th><th>Budget</th><th>Place</th><th>X</th></tr>
        </table>
    </div>

    <div>
        <button class="add-btn" onclick="addRow()">+ Add Friend</button>
        <button class="save-btn" onclick="saveToCloud()">☁️ Save Changes</button>
        <button class="share-btn" onclick="shareApp()">🔗 Share App</button>
    </div>

    <h3 id="totalBudget">Total Budget: 0 ৳</h3>

    <script>
        const API_URL = "https://api.jsonbin.io/v3/b/69b1b847aa77b81da9d8121e?meta=false";
        const API_KEY = "$2a$10$8py.DxjfTqR8l2oY4K256.BPY7JkIkN/KG/q0CCPklJ8Fe9qlhBou"; 

        let friends = [];

        async function loadData() {
            document.getElementById('status').innerText = "Loading list...";
            try {
                const res = await fetch(API_URL, { headers: { "X-Master-Key": API_KEY }});
                const data = await res.json();
                
                document.getElementById('tripDate').value = data.tripDate || "";
                document.getElementById('tripTime').value = data.tripTime || "";
                friends = data.list || (Array.isArray(data) ? data : []);
                document.getElementById('lastUpdated').innerText = "Last saved: " + (data.updatedAt || "Unknown");
                
                renderTable();
                document.getElementById('status').innerText = "✅ Updated just now";
            } catch (e) { document.getElementById('status').innerText = "⚠️ Offline mode"; }
        }

        async function saveToCloud() {
            document.getElementById('status').innerText = "Saving...";
            let now = new Date();
            let timeStr = now.toLocaleDateString() + " " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let payload = { 
                list: friends, 
                updatedAt: timeStr,
                tripDate: document.getElementById('tripDate').value,
                tripTime: document.getElementById('tripTime').value
            };

            try {
                await fetch(API_URL.split('?')[0], {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify(payload)
                });
                document.getElementById('lastUpdated').innerText = "Last saved: " + timeStr;
                document.getElementById('status').innerText = "✅ Saved!";
            } catch (e) { alert("Save failed."); }
        }

        function renderTable() {
            let table = document.getElementById('tripTable');
            table.innerHTML = `<tr><th>Name</th><th>OK?</th><th>Budget</th><th>Place</th><th>X</th></tr>`;
            let total = 0;
            friends.forEach((f, i) => {
                let row = table.insertRow();
                row.className = f.coming ? 'coming' : 'notcoming';
                row.insertCell().innerHTML = `<input type="text" value="${f.name || ''}" placeholder="Name" onchange="update(${i}, 'name', this.value)">`;
                row.insertCell().innerHTML = `<input type="checkbox" ${f.coming ? 'checked' : ''} onchange="update(${i}, 'coming', this.checked)">`;
                row.insertCell().innerHTML = `<input type="number" value="${f.budget || ''}" placeholder="0" onchange="update(${i}, 'budget', this.value)">`;
                row.insertCell().innerHTML = `<input type="text" value="${f.place || ''}" placeholder="Place" onchange="update(${i}, 'place', this.value)">`;
                row.insertCell().innerHTML = `<button class="del-btn" onclick="deleteFriend(${i})">X</button>`;
                if(f.budget && f.coming) total += parseFloat(f.budget);
            });
            document.getElementById('totalBudget').innerText = "Total Budget: " + total + " ৳";
        }

        function update(index, field, value) { friends[index][field] = value; renderTable(); }
        function addRow() { friends.push({name: "", coming: false, budget: "", place: ""}); renderTable(); }
        function deleteFriend(index) { if(confirm("Remove this person?")) { friends.splice(index, 1); renderTable(); } }
        
        async function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'Trip Planner',
                    text: 'Join our trip plan!',
                    url: window.location.href
                });
            } else {
                alert("Link copied to clipboard!");
                navigator.clipboard.writeText(window.location.href);
            }
        }
        
        loadData();
    </script>
</body>
</html>
