<html lang="en">

<style>
body { 
    font-family: 'Segoe UI', Roboto, sans-serif;

    color: #2d3436; 
    margin: 0; 
    padding: 15px; 
    min-height: 100vh;
}

.info-box {
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(12px);
    padding: 20px; border-radius: 25px;
    margin: 15px auto; max-width: 400px;
}

input { 
    width: 85%; padding: 10px; margin: 6px;
    border-radius: 10px; border: none;
    text-align: center;
}

.table-container { 
    margin: 20px auto;
    max-width: 100%;
}

table { 
    width: 100%; 
    border-collapse: collapse;
}

th, td { 
    padding: 10px;
}

button { 
    padding: 10px 15px; 
    margin: 6px; 
    border: none; 
    cursor: pointer;
    border-radius: 10px;
    font-weight: bold;
}

.add-btn { background: #ffffff; }
.save-btn { background: #f39c12; color: white; }
.del-btn { background: red; color: white; }
.edit-btn { background: #3498db; color: white; }
</style>
</head>

<body>

<h2>Trip Planner 🌍</h2>

<div class="info-box">
    <input type="text" id="tripPlace" placeholder="Where are we going?">
    <input type="text" id="tripDate" placeholder="When?">
</div>

<div id="status">Connecting...</div>

<div class="table-container">
<table id="tripTable">
    <tr>
        <th>Name</th>
        <th>OK?</th>
        <th>Budget</th>
        <th>Action</th>
    </tr>
</table>
</div>

<button class="add-btn" onclick="addRow()">+ Add Friend</button>
<button class="save-btn" onclick="saveToFirebase()">SAVE</button>

<h3 id="totalBudget">Total Budget: 0 ৳</h3>

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyALTUk_r0kKG727PDzGu_T3yy072QRhF2g",

  projectId: "trip-planner-407ec",

  messagingSenderId: "792839961352",
  appId: "1:792839961352:web:3b9fd67d3f58ed39844abd",
  measurementId: "G-CJ5DN8XJH5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const tripRef = ref(db, "currentTrip");

let friends = [];

/* LOAD */
onValue(tripRef, (snapshot) => {
    const data = snapshot.val();

    if (data) {
        document.getElementById('tripPlace').value = data.tripPlace || "";
        document.getElementById('tripDate').value = data.tripDate || "";
        friends = data.list || [];
        renderTable();
        document.getElementById('status').innerText = "LIVE SYNC ACTIVE";
    } else {
        document.getElementById('status').innerText = "NO DATA YET";
    }
});

/* AUTO SAVE */
function autoSave() {
    const payload = {
        tripPlace: document.getElementById('tripPlace').value,
        tripDate: document.getElementById('tripDate').value,
        list: friends
    };
    set(tripRef, payload);
}

/* MANUAL SAVE */
window.saveToFirebase = function () {
    document.getElementById('status').innerText = "SAVING...";
    autoSave();
    setTimeout(() => {
        document.getElementById('status').innerText = "SAVED!";
    }, 1000);
};
