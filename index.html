                                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://img.icons8.com/color/512/island-on-water.png">
    <title>Trip Planner 🌍</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: linear-gradient(135deg, #ff9a9e, #fecfef); margin: 0; padding: 15px; min-height: 100vh; }
        .info-box { background: rgba(255, 255, 255, 0.4); padding: 15px; border-radius: 20px; margin: 10px auto; max-width: 400px; }
        .info-input { border: none; padding: 10px; margin: 5px; border-radius: 10px; width: 80%; text-align: center; font-weight: bold; }
        .table-container { background: white; border-radius: 20px; padding: 10px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 10px; font-size: 12px; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        input { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; text-align: center; }
        button { padding: 12px 20px; margin: 5px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .save-btn { background: #fdcb6e; color: white; width: 80%; font-size: 18px; }
        .add-btn { background: white; color: #ff7675; border: 1px solid #ff7675; }
        #status { font-weight: bold; margin: 10px; color: #d63031; }
    </style>
</head>
<body>

    <h2>Trip Planner 🌍</h2>
    <div class="info-box">
        <input type="text" id="tripPlace" class="info-input" placeholder="Destination">
        <input type="text" id="tripDate" class="info-input" placeholder="Date">
    </div>

    <div id="status">Connecting...</div>

    <div class="table-container">
        <table id="tripTable">
            <tr><th>NAME</th><th>OK?</th><th>BUDGET</th></tr>
        </table>
    </div>

    <button class="add-btn" onclick="addRow()">+ Add Friend</button><br>
    <button class="save-btn" onclick="saveToCloud()">☁️ SAVE EVERYTHING</button>

    <script>
        // BRAND NEW BIN - PUBLIC ACCESS
        const BIN_ID = "678e8b60ad19ca34f8f0412e"; 
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let friends = [];

        async function loadData() {
            try {
                const res = await fetch(`${API_URL}/latest`, { headers: { "X-Bin-Meta": "false" } });
                const data = await res.json();
                document.getElementById('tripPlace').value = data.tripPlace || "";
                document.getElementById('tripDate').value = data.tripDate || "";
                friends = data.list || [];
                renderTable();
                document.getElementById('status').innerText = "✅ Connected";
            } catch (e) { document.getElementById('status').innerText = "⚠️ New List"; }
        }

        async function saveToCloud() {
            document.getElementById('status').innerText = "Saving...";
            const payload = { 
                list: friends, 
                tripPlace: document.getElementById('tripPlace').value,
                tripDate: document.getElementById('tripDate').value
            };
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if(res.ok) { document.getElementById('status').innerText = "✅ SAVED SUCCESSFULLY!"; }
                else { alert("Error: Try refreshing the page."); }
            } catch (e) { alert("Check internet connection."); }
        }

        function renderTable() {
            const table = document.getElementById('tripTable');
            table.innerHTML = `<tr><th>NAME</th><th>OK?</th><th>BUDGET</th></tr>`;
            friends.forEach((f, i) => {
                const row = table.insertRow();
                row.insertCell().innerHTML = `<input type="text" value="${f.name||''}" onchange="friends[${i}].name=this.value">`;
                row.insertCell().innerHTML = `<input type="checkbox" ${f.coming?'checked':''} onchange="friends[${i}].coming=this.checked">`;
                row.insertCell().innerHTML = `<input type="number" value="${f.budget||''}" onchange="friends[${i}].budget=this.value">`;
            });
        }
        function addRow() { friends.push({name:"", coming:false, budget:""}); renderTable(); }
        loadData();
    </script>
</body>
</html>
