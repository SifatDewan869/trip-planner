                                   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner 🌍</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: linear-gradient(135deg, #ff9a9e, #fecfef); margin: 0; padding: 15px; min-height: 100vh; color: #2d3436; }
        .info-box { background: rgba(255, 255, 255, 0.4); padding: 15px; border-radius: 20px; margin: 10px auto; max-width: 400px; }
        .info-input { border: none; padding: 10px; margin: 5px; border-radius: 10px; width: 85%; text-align: center; font-weight: bold; background: white; }
        .table-container { background: white; border-radius: 20px; padding: 10px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th { padding: 10px; font-size: 11px; border-bottom: 2px solid #eee; text-transform: uppercase; color: #636e72; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        input { width: 90%; padding: 8px; border: 1px solid #dfe6e9; border-radius: 5px; text-align: center; }
        button { padding: 12px 20px; margin: 5px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .save-btn { background: #fdcb6e; color: white; width: 90%; font-size: 18px; margin-top: 15px; }
        .add-btn { background: white; color: #ff7675; border: 1.5px solid #ff7675; }
        #status { font-weight: bold; margin: 10px; font-size: 14px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h2>Trip Planner 🌍</h2>
    <div class="info-box">
        <input type="text" id="tripPlace" class="info-input" placeholder="📍 Destination">
        <input type="text" id="tripDate" class="info-input" placeholder="📅 Date & Time">
    </div>

    <div id="status">Ready</div>

    <div class="table-container">
        <table id="tripTable">
            <tr><th>NAME</th><th>OK?</th><th>BUDGET</th></tr>
        </table>
    </div>

    <button class="add-btn" onclick="addRow()">+ Add Friend</button><br>
    <button class="save-btn" onclick="saveToCloud()">☁️ SAVE EVERYTHING</button>

    <script>
        // NEW BULLETPROOF STORAGE
        const API_URL = "https://api.jsonbin.io/v3/b/65f80f971f56e9443a562477";
        const KEY = "$2a$10$8py.DxjfTqR8l2oY4K256.BPY7JkIkN/KG/q0CCPklJ8Fe9qlhBou";

        let friends = [];

        async function loadData() {
            document.getElementById('status').innerText = "Syncing...";
            try {
                const res = await fetch(API_URL + "/latest", { headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" } });
                const data = await res.json();
                document.getElementById('tripPlace').value = data.tripPlace || "";
                document.getElementById('tripDate').value = data.tripDate || "";
                friends = data.list || [];
                renderTable();
                document.getElementById('status').innerText = "✅ Online";
            } catch (e) { document.getElementById('status').innerText = "🆕 New Trip Started"; }
        }

        async function saveToCloud() {
            document.getElementById('status').innerText = "Saving...";
            const payload = {
                list: friends,
                tripPlace: document.getElementById('tripPlace').value,
                tripDate: document.getElementById('tripDate').value
            };
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": KEY },
                    body: JSON.stringify(payload)
                });
                if(res.ok) { 
                    document.getElementById('status').innerText = "✅ SAVED!";
                    setTimeout(() => { document.getElementById('status').innerText = "✅ Online"; }, 2000);
                } else { alert("Error. Please try once more."); }
            } catch (e) { alert("Check internet!"); }
        }

        function renderTable() {
            const table = document.getElementById('tripTable');
            table.innerHTML = `<tr><th>NAME</th><th>OK?</th><th>BUDGET</th></tr>`;
            friends.forEach((f, i) => {
                const row = table.insertRow();
                row.insertCell().innerHTML = `<input type="text" value="${f.name||''}" onchange="friends[${i}].name=this.value">`;
                row.insertCell().innerHTML = `<input type="checkbox" ${f.coming?'checked':''} onchange="friends[${i}].coming=this.checked">`;
                row.insertCell().innerHTML = `<input type="number" value="${f.budget||''}" onchange="friends[${i}].budget=this.value">`;
            });
        }
        function addRow() { friends.push({name:"", coming:false, budget:""}); renderTable(); }
        loadData();
    </script>
</body>
</html>
