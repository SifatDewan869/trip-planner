<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Friend Trip Planner</title>
    <style>
        body { font-family: Arial; text-align: center; background-color: olive; color: black; margin: 10px; }
        table { margin: auto; border-collapse: collapse; width: 100%; max-width: 600px; background-color: #fffdd0; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        input { width: 90%; padding: 5px; border: none; background: transparent; }
        button { padding: 10px; margin: 10px; background-color: #fffdd0; border: 1px solid black; cursor: pointer; font-weight: bold; }
        .coming { background-color: #c8f7c5; }
        .notcoming { background-color: #f7c5c5; }
        #status { font-size: 12px; color: white; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>Shared Trip Planner 🌍</h2>
    <div id="status">Syncing...</div>

    <table id="tripTable">
        <tr><th>Name</th><th>Coming?</th><th>Budget (৳)</th><th>Place</th></tr>
    </table>

    <button onclick="addRow()">+ Add Friend</button>
    <button onclick="saveToCloud()">☁️ Save Changes</button>

    <p id="totalBudget">Total Budget: 0 ৳</p>

    <script>
        // REPLACE THIS URL with your own from jsonbin.io or a similar service
        const API_URL = "https://api.jsonbin.io/v3/b/69b1b847aa77b81da9d8121e";
        const API_KEY = "$2a$10$8py.DxjfTqR8l2oY4K256.BPY7JkIkN/KG/q0CCPklJ8Fe9qlhBou"; 

        let friends = [];

        async function loadData() {
            document.getElementById('status').innerText = "Loading shared list...";
            try {
                const res = await fetch(API_URL, { headers: { "X-Master-Key": API_KEY }});
                const data = await res.json();
                friends = data.record || [];
                renderTable();
                document.getElementById('status').innerText = "Updated just now";
            } catch (e) { document.getElementById('status').innerText = "Offline mode"; }
        }

        async function saveToCloud() {
            document.getElementById('status').innerText = "Saving to cloud...";
            await fetch(API_URL, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(friends)
            });
            document.getElementById('status').innerText = "Saved for everyone!";
        }

        function renderTable() {
            let table = document.getElementById('tripTable');
            table.innerHTML = `<tr><th>Name</th><th>Coming?</th><th>Budget (৳)</th><th>Place</th></tr>`;
            let total = 0;
            friends.forEach((f, i) => {
                let row = table.insertRow();
                row.className = f.coming ? 'coming' : 'notcoming';
                
                row.insertCell().innerHTML = `<input type="text" value="${f.name}" onchange="update(${i}, 'name', this.value)">`;
                row.insertCell().innerHTML = `<input type="checkbox" ${f.coming ? 'checked' : ''} onchange="update(${i}, 'coming', this.checked)">`;
                row.insertCell().innerHTML = `<input type="number" value="${f.budget}" onchange="update(${i}, 'budget', this.value)">`;
                row.insertCell().innerHTML = `<input type="text" value="${f.place}" onchange="update(${i}, 'place', this.value)">`;
                if(f.budget) total += parseFloat(f.budget);
            });
            document.getElementById('totalBudget').innerText = "Total Budget: " + total + " ৳";
        }

        function update(index, field, value) {
            friends[index][field] = value;
            renderTable();
        }

        function addRow() {
            friends.push({name: "", coming: false, budget: "", place: ""});
            renderTable();
        }

        loadData();
    </script>
</body>
</html>
