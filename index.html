                  <!DOCTYPE html>
<html>
<head>
<title>Friend Trip Planner</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #f1f5f9;
    margin: 0;
    padding: 0;
    text-align: center;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    color: #38bdf8;
}

input {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
    outline: none;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.save-btn {
    width: 90%;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    color: white;
}

.edit-btn {
    background: #facc15;
    color: black;
}

.delete-btn {
    background: #ef4444;
    color: white;
}

.card {
    background: rgba(30, 41, 59, 0.8);
    padding: 15px;
    margin: 10px auto;
    border-radius: 12px;
    text-align: left;
}
</style>

</head>

<body>

<div class="container">

    <h1>Friend Trip Planner</h1>

    <input type="text" id="name" placeholder="Friend Name">
    <input type="number" id="budget" placeholder="Budget">

    <button class="save-btn" onclick="saveData()">Save</button>

    <h2>Trip List</h2>
    <div id="dataList"></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyALTUk_r0kKG727PDzGu_T3yy072QRhF2g",
  authDomain: "trip-planner-407ec.firebaseapp.com",
  projectId: "trip-planner-407ec",
  storageBucket: "trip-planner-407ec.firebasestorage.app",
  messagingSenderId: "792839961352",
  appId: "1:792839961352:web:3b9fd67d3f58ed39844abd",
  measurementId: "G-CJ5DN8XJH5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let editId = null;

/* SAVE OR UPDATE */
window.saveData = function () {
    let name = document.getElementById("name").value;
    let budget = document.getElementById("budget").value;

    if (!name || !budget) return;

    if (editId) {
        update(ref(db, "trips/" + editId), {
            name: name,
            budget: budget
        });
        editId = null;
    } else {
        push(ref(db, "trips"), {
            name: name,
            budget: budget
        });
    }

    document.getElementById("name").value = "";
    document.getElementById("budget").value = "";
};

/* LOAD DATA */
onValue(ref(db, "trips"), (snapshot) => {
    let dataList = document.getElementById("dataList");
    dataList.innerHTML = "";

    snapshot.forEach((child) => {
        let data = child.val();
        let id = child.key;

        dataList.innerHTML += `
            <div class="card">
                <b>Name:</b> ${data.name}<br>
                <b>Budget:</b> ${data.budget}<br><br>

                <button class="edit-btn" onclick="editData('${id}', '${data.name}', '${data.budget}')">Edit</button>
                <button class="delete-btn" onclick="deleteData('${id}')">Delete</button>
            </div>
        `;
    });
});

/* DELETE */
window.deleteData = function(id) {
    remove(ref(db, "trips/" + id));
};

/* EDIT */
window.editData = function(id, name, budget) {
    document.getElementById("name").value = name;
    document.getElementById("budget").value = budget;
    editId = id;
};
</script>

</body>
</html>
