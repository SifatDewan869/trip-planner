            <!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Trip Planner</title>
    <style>
        body { font-family: Arial; text-align: center; background-color: olive; color: black; margin: 5px; }
        /* This makes the table scrollable sideways if it gets too wide */
        .table-container { overflow-x: auto; margin: auto; max-width: 100%; border: 1px solid black; background-color: #fffdd0; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th, td { border: 1px solid black; padding: 5px; text-align: center; font-size: 13px; }
        input { width: 85%; padding: 4px; border: none; background: transparent; text-align: center; font-size: 13px; }
        button { padding: 10px; margin: 10px; background-color: #fffdd0; border: 1px solid black; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .coming { background-color: #c8f7c5; }
        .notcoming { background-color: #f7c5c5; }
        #status { font-size: 12px; color: white; margin-bottom: 5px; font-weight: bold; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 5px 8px; border-radius: 3px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Shared Trip Planner 🌍</h2>
    <div id="status">Checking connection...</div>

    <div class="table-container">
        <table id="tripTable">
            <tr><th>Name</th><th>Coming?</th><th>Budget</th><th>Place</th><th>X</th></tr>
        </table>
    </div>

    <div style="margin-top: 15px;">
        <button onclick="addRow()">+ Add Friend</button>
        <button onclick="saveToCloud()" style="background-color: #ffd700;">☁️ Save Changes</button>
    </div>

    <h3 id="totalBudget">Total Budget: 0 ৳</h3>

    <script>
        const API_URL = "https://api.jsonbin.io/v3/b/69b1b847aa77b81da9d8121e?meta=false";
        const API_KEY = "$2a$10$8py.DxjfTqR8l2oY4K256.BPY7JkIkN/KG/q0CCPklJ8Fe9qlhBou"; 

        let friends = [];

        async function loadData() {
            document.getElementById('status').innerText = "Loading shared list...";
            try {
                const res = await fetch(API_URL, { headers: { "X-Master-Key": API_KEY }});
                const data = await res.json();
                friends = Array.isArray(data) ? data : []; 
                renderTable();
                document.getElementById('status').innerText = "✅ Updated just now";
            } catch (e) { document.getElementById('status').innerText = "⚠️ Offline mode"; }
        }

        async function saveToCloud() {
            document.getElementById('status').innerText = "Saving to cloud...";
            try {
                await fetch(API_URL.split('?')[0], {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify(friends)
                });
                document.getElementById('status').innerText = "✅ Saved for everyone!";
            } catch (e) { alert("Save failed."); }
        }

        function renderTable() {
            let table = document.getElementById('tripTable');
            table.innerHTML = `<tr><th>Name</th><th>OK?</th><th>Budget</th><th>Place</th><th>X</th></tr>`;
            let total = 0;
            friends.forEach((f, i) => {
                let row = table.insertRow();
                row.className = f.coming ? 'coming' : 'notcoming';
                row.insertCell().innerHTML = `<input type="text" value="${f.name || ''}" placeholder="Name" onchange="update(${i}, 'name', this.value)">`;
                row.insertCell().innerHTML = `<input type="checkbox" ${f.coming ? 'checked' : ''} onchange="update(${i}, 'coming', this.checked)">`;
                row.insertCell().innerHTML = `<input type="number" value="${f.budget || ''}" placeholder="0" onchange="update(${i}, 'budget', this.value)">`;
                row.insertCell().innerHTML = `<input type="text" value="${f.place || ''}" placeholder="Place" onchange="update(${i}, 'place', this.value)">`;
                row.insertCell().innerHTML = `<button class="del-btn" onclick="deleteFriend(${i})">X</button>`;
                if(f.budget && f.coming) total += parseFloat(f.budget);
            });
            document.getElementById('totalBudget').innerText = "Total Budget: " + total + " ৳";
        }

        function update(index, field, value) {
            friends[index][field] = value;
            renderTable();
        }

        function addRow() {
            friends.push({name: "", coming: false, budget: "", place: ""});
            renderTable();
        }

        function deleteFriend(index) {
            if(confirm("Remove this friend?")) {
                friends.splice(index, 1);
                renderTable();
            }
        }
        loadData();
    </script>
</body>
</html>
