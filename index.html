                    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner 🌍</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    color: #2d3436;
    padding: 15px;
}

.info-box {
    background: rgba(255,255,255,0.3);
    padding: 20px;
    border-radius: 20px;
    margin: 10px auto;
    max-width: 400px;
}

.info-input {
    padding: 10px;
    margin: 8px;
    width: 80%;
    border-radius: 10px;
    border: none;
    text-align: center;
}

table {
    width: 100%;
    background: white;
    margin-top: 15px;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.add-btn { background: white; }
.save-btn { background: orange; color: white; }
.del-btn { background: red; color: white; }

#status { color: white; font-weight: bold; }
</style>
</head>

<body>

<h2>Trip Planner 🌍</h2>

<div class="info-box">
<input id="tripPlace" class="info-input" placeholder="Where?">
<input id="tripDate" class="info-input" placeholder="When?">
</div>

<div id="status">Connecting...</div>

<table id="tripTable">
<tr><th>Name</th><th>Going</th><th>Budget</th><th>X</th></tr>
</table>

<button class="add-btn" onclick="addRow()">+ Add</button>
<button class="save-btn" onclick="saveData()">SAVE</button>

<h3 id="totalBudget">Total: 0 ৳</h3>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ YOUR CONFIG (ALREADY ADDED) */
const firebaseConfig = {
  apiKey: "AIzaSyALTUk_r0kKG727PDzGu_T3yy072QRhF2g",
  authDomain: "trip-planner-407ec.firebaseapp.com",
  projectId: "trip-planner-407ec",
  storageBucket: "trip-planner-407ec.firebasestorage.app",
  messagingSenderId: "792839961352",
  appId: "1:792839961352:web:1b1c12e27cc18dd9844abd",
  measurementId: "G-NRCETSMYDQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const docRef = doc(db, "trip", "global");

let friends = [];

/* 🔄 LIVE SYNC */
onSnapshot(docRef, (docSnap) => {
    if (docSnap.exists()) {
        const data = docSnap.data();

        document.getElementById('tripPlace').value = data.tripPlace || "";
        document.getElementById('tripDate').value = data.tripDate || "";
        friends = data.list || [];

        render();
        document.getElementById('status').innerText = "🟢 Live";
    } else {
        document.getElementById('status').innerText = "🆕 New";
    }
});

/* 💾 SAVE */
async function saveData() {
    const payload = {
        tripPlace: document.getElementById('tripPlace').value,
        tripDate: document.getElementById('tripDate').value,
        list: friends
    };

    await setDoc(docRef, payload);
}

/* 📊 TABLE */
function render() {
    const table = document.getElementById('tripTable');
    table.innerHTML = `<tr><th>Name</th><th>Going</th><th>Budget</th><th>X</th></tr>`;

    let total = 0;

    friends.forEach((f, i) => {
        const row = table.insertRow();

        row.insertCell().innerHTML =
        `<input value="${f.name||''}" onchange="update(${i}, 'name', this.value)">`;

        row.insertCell().innerHTML =
        `<input type="checkbox" ${f.going?'checked':''} onchange="update(${i}, 'going', this.checked)">`;

        row.insertCell().innerHTML =
        `<input type="number" value="${f.budget||''}" onchange="update(${i}, 'budget', this.value)">`;

        row.insertCell().innerHTML =
        `<button class="del-btn" onclick="del(${i})">X</button>`;

        if(f.going && f.budget) total += parseFloat(f.budget);
    });

    document.getElementById('totalBudget').innerText = "Total: " + total + " ৳";
}

/* ⚙️ FUNCTIONS */
function addRow() {
    friends.push({name:"", going:false, budget:""});
    render();
}

function update(i, f, v) {
    friends[i][f] = v;
    render();
}

function del(i) {
    friends.splice(i,1);
    render();
}

/* 🔗 GLOBAL */
window.addRow = addRow;
window.update = update;
window.del = del;
window.saveData = saveData;

</script>

</body>
</html>
