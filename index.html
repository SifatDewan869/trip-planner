                    <!DOCTYPE html>
<html>
<head>
<title>Friend Trip Planner</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #f1f5f9;
    text-align: center;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    color: #38bdf8;
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
    font-size: 16px;
    outline: none;
}

button {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.card {
    background: rgba(30, 41, 59, 0.8);
    padding: 15px;
    margin: 10px auto;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
    text-align: left;
}
</style>

</head>

<body>

<div class="container">

    <h1>Friend Trip Planner</h1>

    <input type="text" id="name" placeholder="Friend Name">
    <input type="number" id="budget" placeholder="Budget">

    <button onclick="saveData()">Save</button>

    <h2>Trip List</h2>
    <div id="dataList"></div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
/* ================= FIREBASE SETUP ================= */
const firebaseConfig = {
    YOUR_FIREBASE_CONFIG
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= SAVE DATA ================= */
function saveData() {
    let name = document.getElementById("name").value;
    let budget = document.getElementById("budget").value;

    if(name === "" || budget === "") return;

    let newRef = db.ref("trips").push();
    newRef.set({
        name: name,
        budget: budget
    });

    document.getElementById("name").value = "";
    document.getElementById("budget").value = "";
}

/* ================= LOAD DATA ================= */
db.ref("trips").on("value", function(snapshot) {
    let dataList = document.getElementById("dataList");
    dataList.innerHTML = "";

    snapshot.forEach(function(child) {
        let data = child.val();

        dataList.innerHTML += `
            <div class="card">
                <b>Name:</b> ${data.name}<br>
                <b>Budget:</b> ${data.budget}
            </div>
        `;
    });
});
</script>

</body>
</html>
