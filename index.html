                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner 🌍</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #ff9a9e; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; margin: 5px; border-radius: 10px; border: 1px solid #ddd; }
        table { width: 100%; margin-top: 20px; }
        .btn { padding: 15px; width: 100%; background: #fdcb6e; border: none; border-radius: 15px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        #status { margin: 10px; font-weight: bold; color: #2d3436; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Trip Planner 🌍</h2>
        <input type="text" id="tripPlace" placeholder="📍 Where to?">
        <input type="text" id="tripDate" placeholder="📅 When?">
        
        <div id="status">Connecting...</div>

        <table id="tripTable"></table>
        
        <button onclick="addRow()" style="background:#eee; border:none; padding:10px; border-radius:10px; width:100%; margin-top:10px;">+ Add Person</button>
        <button class="btn" onclick="saveData()">☁️ SAVE NOW</button>
    </div>

    <script>
        const B_ID = "67db0ca2ad19ca34f8092acc"; 
        const M_KEY = "$2a$10$8py.DxjfTqR8l2oY4K256.BPY7JkIkN/KG/q0CCPklJ8Fe9qlhBou";
        const URL = `https://api.jsonbin.io/v3/b/${B_ID}`;

        let friends = [];

        async function load() {
            try {
                const r = await fetch(URL + "/latest", { headers: { "X-Master-Key": M_KEY, "X-Bin-Meta": "false" } });
                const d = await r.json();
                document.getElementById('tripPlace').value = d.tripPlace || "";
                document.getElementById('tripDate').value = d.tripDate || "";
                friends = d.list || [];
                render();
                document.getElementById('status').innerText = "✅ Connected";
            } catch (e) { document.getElementById('status').innerText = "❌ Load Error"; }
        }

        async function saveData() {
            document.getElementById('status').innerText = "Saving...";
            const body = { 
                list: friends, 
                tripPlace: document.getElementById('tripPlace').value, 
                tripDate: document.getElementById('tripDate').value 
            };
            try {
                const r = await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": M_KEY },
                    body: JSON.stringify(body)
                });
                if(r.ok) { document.getElementById('status').innerText = "✅ SAVED!"; }
                else { alert("Database error. Try again."); }
            } catch (e) { alert("Check internet."); }
        }

        function render() {
            const t = document.getElementById('tripTable');
            t.innerHTML = "";
            friends.forEach((f, i) => {
                const row = t.insertRow();
                row.insertCell().innerHTML = `<input style="width:70%" type="text" value="${f.name||''}" onchange="friends[${i}].name=this.value">`;
                row.insertCell().innerHTML = `<input type="checkbox" ${f.coming?'checked':''} onchange="friends[${i}].coming=this.checked">`;
            });
        }
        function addRow() { friends.push({name:"", coming:false}); render(); }
        load();
    </script>
</body>
</html>
