                        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Trip Planner 🌍</title>
    <style>
        /* Modern Sunset Gradient Background */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            background-attachment: fixed;
            color: #2d3436; 
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }

        h2 { color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        /* THE GLASS EFFECT CONTAINER */
        .table-container { 
            overflow-x: auto; 
            margin: 20px auto; 
            max-width: 100%; 
            background: rgba(255, 255, 255, 0.25); /* Semi-transparent white */
            backdrop-filter: blur(12px);          /* The "Frosty" Blur */
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { background: rgba(255, 255, 255, 0.3); padding: 12px; font-size: 14px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        input { 
            width: 90%; padding: 8px; border: none; background: rgba(255, 255, 255, 0.4); 
            text-align: center; border-radius: 8px; font-size: 14px; color: #2d3436;
        }

        /* Coming/Not Coming Row Colors with Transparency */
        .coming { background-color: rgba(168, 230, 173, 0.4); }
        .notcoming { background-color: rgba(255, 170, 170, 0.4); }

        button { 
            padding: 12px 20px; margin: 10px; border: none; cursor: pointer; 
            font-weight: bold; border-radius: 12px; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .add-btn { background-color: #ffffff; color: #ff7675; }
        .save-btn { background-color: #fdcb6e; color: #fff; }

        #status { font-size: 12px; color: #fff; margin-bottom: 5px; font-weight: bold; background: rgba(0,0,0,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .del-btn { background: #ff7675; color: white; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; }
        
        #totalBudget { color: #fff; font-size: 20px; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h2>Trip Planner 🌍</h2>
    <div id="status">Syncing...</div>

    <div class="table-container">
        <table id="tripTable">
            <tr><th>Name</th><th>OK?</th><th>Budget</th><th>Place</th><th>X</th></tr>
        </table>
    </div>

    <div style="margin-top: 15px;">
        <button class="add-btn" onclick="addRow()">+ Add Friend</button>
        <button class="save-btn" onclick="saveToCloud()">☁️ Save Changes</button>
    </div>

    <h3 id="totalBudget">Total Budget: 0 ৳</h3>

    <script>
        const API_URL = "https://api.jsonbin.io/v3/b/69b1b847aa77b81da9d8121e?meta=false";
        const API_KEY = "$2a$10$8py.DxjfTqR8l2oY4K256.BPY7JkIkN/KG/q0CCPklJ8Fe9qlhBou"; 

        let friends = [];

        async function loadData() {
            document.getElementById('status').innerText = "Loading shared list...";
            try {
                const res = await fetch(API_URL, { headers: { "X-Master-Key": API_KEY }});
                const data = await res.json();
                friends = Array.isArray(data) ? data : []; 
                renderTable();
                document.getElementById('status').innerText = "✅ Updated just now";
            } catch (e) { document.getElementById('status').innerText = "⚠️ Offline mode"; }
        }

        async function saveToCloud() {
            document.getElementById('status').innerText = "Saving to cloud...";
            try {
                await fetch(API_URL.split('?')[0], {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify(friends)
                });
                document.getElementById('status').innerText = "✅ Saved for everyone!";
            } catch (e) { alert("Save failed."); }
        }

        function renderTable() {
            let table = document.getElementById('tripTable');
            table.innerHTML = `<tr><th>Name</th><th>OK?</th><th>Budget</th><th>Place</th><th>X</th></tr>`;
            let total = 0;
            friends.forEach((f, i) => {
                let row = table.insertRow();
                row.className = f.coming ? 'coming' : 'notcoming';
                row.insertCell().innerHTML = `<input type="text" value="${f.name || ''}" placeholder="Name" onchange="update(${i}, 'name', this.value)">`;
                row.insertCell().innerHTML = `<input type="checkbox" ${f.coming ? 'checked' : ''} onchange="update(${i}, 'coming', this.checked)">`;
                row.insertCell().innerHTML = `<input type="number" value="${f.budget || ''}" placeholder="0" onchange="update(${i}, 'budget', this.value)">`;
                row.insertCell().innerHTML = `<input type="text" value="${f.place || ''}" placeholder="Place" onchange="update(${i}, 'place', this.value)">`;
                row.insertCell().innerHTML = `<button class="del-btn" onclick="deleteFriend(${i})">X</button>`;
                if(f.budget && f.coming) total += parseFloat(f.budget);
            });
            document.getElementById('totalBudget').innerText = "Total Budget: " + total + " ৳";
        }

        function update(index, field, value) {
            friends[index][field] = value;
            renderTable();
        }

        function addRow() {
            friends.push({name: "", coming: false, budget: "", place: ""});
            renderTable();
        }

        function deleteFriend(index) {
            if(confirm("Remove this friend?")) {
                friends.splice(index, 1);
                renderTable();
            }
        }
        loadData();
    </script>
</body>
</html>
