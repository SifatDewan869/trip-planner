                          <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff9a9e">
    <title>Trip Planner 🌍</title>
    <style>
        /* Recreated from your screenshots */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            background-attachment: fixed;
            color: #2d3436; margin: 0; padding: 15px; min-height: 100vh;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            padding: 20px; border-radius: 25px;
            margin: 15px auto; max-width: 400px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .info-input { 
            background: rgba(255,255,255,0.5); border: none; padding: 10px; 
            margin: 8px; border-radius: 12px; width: 85%; text-align: center;
            font-weight: bold; color: #2d3436; font-size: 16px; outline: none;
        }
        .table-container { 
            overflow-x: auto; margin: 20px auto; max-width: 100%; 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(12px); border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th { background: rgba(255, 255, 255, 0.2); padding: 15px; font-size: 12px; text-transform: uppercase; color: #636e72; }
        td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        input[type="text"], input[type="number"] { 
            width: 85%; padding: 8px; border: none; background: rgba(255, 255, 255, 0.4); 
            text-align: center; border-radius: 8px; font-size: 14px; color: #2d3436;
        }
        button { 
            padding: 12px 20px; margin: 8px; border: none; cursor: pointer; 
            font-weight: bold; border-radius: 18px; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* Buttons restored to your original style */
        .add-btn { background-color: #ffffff; color: #ff7675; }
        .save-btn { background: #fdcb6e; color: #fff; }
        .share-btn { background-color: #55efc4; color: #fff; width: 160px; }
        .del-btn { background: #ff7675; color: white; border-radius: 8px; padding: 5px 10px; border: none; }
        
        #status { font-size: 14px; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); margin-bottom: 5px; }
        #totalBudget { color: #fff; font-size: 26px; text-shadow: 1px 1px 4px rgba(0,0,0,0.2); margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Trip Planner 🌍</h2>
    <div class="info-box">
        <h3>📍 Destination & Time</h3>
        <input type="text" id="tripPlace" class="info-input" placeholder="Where are we going?">
        <input type="text" id="tripDate" class="info-input" placeholder="Which day?">
        <input type="text" id="tripTime" class="info-input" placeholder="What time?">
    </div>
    
    <div id="status">📡 Connecting to Firebase...</div>

    <div class="table-container">
        <table id="tripTable">
            <tr><th>NAME</th><th>OK?</th><th>BUDGET</th><th>X</th></tr>
        </table>
    </div>

    <div>
        <button class="add-btn" onclick="addRow()">+ Add Friend</button>
        <button class="save-btn" onclick="saveToFirebase()">☁️ Save Changes</button><br>
        <button class="share-btn" onclick="shareApp()">🔗 Share App</button>
    </div>

    <h3 id="totalBudget">Total Budget: 0 ৳</h3>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Your Firebase config from the snippet you provided
        const firebaseConfig = {
          apiKey: "AIzaSyALTUk_r0kKG727PDzGu_T3yy072QRhF2g",
          authDomain: "trip-planner-407ec.firebaseapp.com",
          projectId: "trip-planner-407ec",
          storageBucket: "trip-planner-407ec.firebasestorage.app",
          messagingSenderId: "792839961352",
          appId: "1:792839961352:web:3b9fd67d3f58ed39844abd",
          measurementId: "G-CJ5DN8XJH5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tripRef = ref(db, "activeTrip");

        let friends = [];

        // LIVE LOAD
        onValue(tripRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('tripPlace').value = data.tripPlace || "";
                document.getElementById('tripDate').value = data.tripDate || "";
                document.getElementById('tripTime').value = data.tripTime || "";
                friends = data.list || [];
                renderTable();
                document.getElementById('status').innerText = "✅ Cloud Connected";
            } else {
                document.getElementById('status').innerText = "🆕 System Ready";
            }
        });

        // SAVE EVERYTHING
        window.saveToFirebase = function() {
            document.getElementById('status').innerText = "Saving...";
            const payload = {
                tripPlace: document.getElementById('tripPlace').value,
                tripDate: document.getElementById('tripDate').value,
                tripTime: document.getElementById('tripTime').value,
                list: friends
            };

            set(tripRef, payload)
                .then(() => {
                    document.getElementById('status').innerText = "✅ SAVED SUCCESSFULLY!";
                    setTimeout(() => { document.getElementById('status').innerText = "✅ Cloud Connected"; }, 2000);
                })
                .catch(() => alert("Save failed. Check your internet."));
        };

        function renderTable() {
            const table = document.getElementById('tripTable');
            table.innerHTML = `<tr><th>NAME</th><th>OK?</th><th>BUDGET</th><th>X</th></tr>`;
            let total = 0;
            friends.forEach((f, i) => {
                const row = table.insertRow();
                row.insertCell().innerHTML = `<input type="text" value="${f.name||''}" placeholder="Name" onchange="updateRow(${i}, 'name', this.value)">`;
                row.insertCell().innerHTML = `<input type="checkbox" ${f.coming?'checked':''} onchange="updateRow(${i}, 'coming', this.checked)">`;
                row.insertCell().innerHTML = `<input type="number" value="${f.budget||''}" placeholder="0" onchange="updateRow(${i}, 'budget', this.value)">`;
                row.insertCell().innerHTML = `<button class="del-btn" onclick="deleteRow(${i})">X</button>`;
                
                if (f.coming && f.budget) total += parseFloat(f.budget);
            });
            document.getElementById('totalBudget').innerText = "Total Budget: " + total + " ৳";
        }

        window.updateRow = (idx, field, val) => { friends[idx][field] = val; renderTable(); };
        window.addRow = () => { friends.push({name: "", coming: false, budget: ""}); renderTable(); };
        window.deleteRow = (idx) => { friends.splice(idx, 1); renderTable(); };
        
        window.shareApp = () => {
            if (navigator.share) {
                navigator.share({ title: 'Trip Planner', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied!");
            }
        };
    </script>
</body>
</html>
